<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berry Analyst AI | Real-time Multimodal Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }

    header {
      backdrop-filter: blur(12px); background: rgba(15, 23, 42, 0.8);
      border-bottom: 2px solid var(--accent); padding: 1.2rem 2rem;
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
    }
    header .logo { font-size: 1.3rem; font-weight: 700; }
    header .logo span { color: var(--accent); }

    .api-status { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .status-off { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .status-on { background: rgba(16, 185, 129, 0.1); color: #10b981; }

    /* ── Config Tray ── */
    .config-tray {
      max-width: 800px; margin: 1.5rem auto 0; width: 100%; padding: 0 1.5rem;
    }
    .config-inner {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 1.25rem; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .row { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
    .config-inner input, .config-inner select {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
      border-radius: 0.75rem; padding: 0.6rem 1rem; color: #fff; outline: none; font-family: inherit;
    }
    .config-inner button {
      background: var(--accent); color: #fff; border: none; border-radius: 0.75rem;
      padding: 0.6rem 1.5rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .config-inner button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

    /* ── Main ── */
    main { flex: 1; max-width: 800px; margin: 0 auto; padding: 1.5rem; width: 100%; }

    .media-container {
      width: 100%; aspect-ratio: 4/3; border-radius: 2rem; overflow: hidden;
      background: #000; border: 1px solid var(--glass-border); 
      position: relative; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    #video-feed { width: 100%; height: 100%; object-fit: cover; }
    #static-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
    #canvas-temp { display: none; }

    .media-overlay {
      position: absolute; bottom: 1.5rem; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 1rem;
    }
    .btn-circle {
      width: 60px; height: 60px; border-radius: 30px; border: none;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-circle:hover { transform: translateY(-3px) scale(1.05); background: rgba(255,255,255,0.2); }
    .btn-circle.active { background: var(--accent); color: #fff; box-shadow: 0 0 25px var(--accent-glow); }

    /* ── Results ── */
    #report-panel { display: none; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1.25rem; padding: 1.2rem 0.8rem; text-align: center; }
    .stat-box .val { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .stat-box .lab { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; font-weight: 700; text-transform: uppercase; }

    .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.25rem; }
    .card .title { font-size: 0.75rem; font-weight: 800; color: var(--accent); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .card .body { font-size: 1rem; line-height: 1.6; color: #cbd5e1; }

    /* ── UI Feedback ── */
    #error-log {
      display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 1rem; padding: 1.25rem; color: #fca5a5; font-size: 0.85rem; margin-top: 1rem; line-height: 1.6;
    }
    #live-indicator {
      position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(239,68,68,0.85);
      color: white; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 800;
      animation: pulse 1s infinite; display: none; backdrop-filter: blur(5px);
    }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    #loading-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; z-index: 50;
    }
    .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: rotation 1s linear infinite; }
    @keyframes rotation { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">Berry<span>Analyst</span> AI</div>
  <div id="api-badge" class="api-status status-off">Key Offline</div>
</header>

<div class="config-tray">
  <div class="config-inner">
    <div class="row">
      <input id="key-input" type="password" placeholder="Gemini API Key (AIzaSy...)" />
      <button onclick="saveKey()">Connect</button>
    </div>
    <div class="row">
      <select id="model-select" onchange="updateModel()">
        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast & Optimal)</option>
        <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash (Latest)</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro (Powerful Detail)</option>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="media-container" id="media-wrap">
    <video id="video-feed" autoplay playsinline muted></video>
    <img id="static-preview" src="" alt="Snapshot" />
    <canvas id="canvas-temp"></canvas>
    
    <div id="live-indicator">ACTIVE AI STREAM</div>
    
    <div id="loading-overlay">
      <div class="loader"></div>
      <p style="font-size: 13px; font-weight: 500;">AI Context Analyzing...</p>
    </div>

    <div class="media-overlay">
      <button class="btn-circle" id="camera-btn" onclick="toggleCamera()">📸</button>
      <button class="btn-circle" id="live-btn" onclick="toggleLiveMode()">🤖</button>
      <button class="btn-circle" onclick="document.getElementById('file-input').click()">📂</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)" />
    </div>
  </div>

  <div id="report-panel">
    <div class="stats-row">
      <div class="stat-box">
        <div class="val" id="res-rip">-</div>
        <div class="lab">Ripeness</div>
      </div>
      <div class="stat-box">
        <div class="val" id="res-brix">-</div>
        <div class="lab">Brix Est.</div>
      </div>
      <div class="stat-box">
        <div class="val" id="res-conf">-</div>
        <div class="lab">Conf.</div>
      </div>
    </div>

    <div class="card">
      <div class="title">AI Diagnosis</div>
      <div class="body" id="res-diag">Waiting for sensory input...</div>
    </div>
    <div class="card">
      <div class="title">Instruction</div>
      <div class="body" id="res-inst">-</div>
    </div>
  </div>

  <div id="error-log"></div>
</main>

<script>
  const STORAGE_KEY = 'berry_analyst_v4_key';
  let cameraActive = false;
  let liveActive = false;
  let timerId = null;

  window.onload = () => {
    const key = localStorage.getItem(STORAGE_KEY);
    if(key) {
      document.getElementById('key-input').value = key;
      updateStatus(true);
    }
  };

  function saveKey() {
    const v = document.getElementById('key-input').value.trim();
    if(!v) return alert('Key is empty.');
    localStorage.setItem(STORAGE_KEY, v);
    updateStatus(true);
    alert('AI connection established.');
  }

  function updateStatus(on) {
    const b = document.getElementById('api-badge');
    b.className = on ? 'api-status status-on' : 'api-status status-off';
    b.textContent = on ? 'API Connected' : 'Key Offline';
  }

  async function toggleCamera() {
    const v = document.getElementById('video-feed');
    const p = document.getElementById('static-preview');
    const b = document.getElementById('camera-btn');

    if(!cameraActive) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        v.srcObject = stream;
        v.style.display = 'block';
        p.style.display = 'none';
        cameraActive = true;
        b.classList.add('active');
        document.getElementById('report-panel').style.display = 'block';
      } catch(err) {
        showError('Access Error: ' + err.message);
      }
    } else {
      killCamera();
    }
  }

  function killCamera() {
    const v = document.getElementById('video-feed');
    if(v.srcObject) v.srcObject.getTracks().forEach(track => track.stop());
    v.srcObject = null;
    v.style.display = 'none';
    cameraActive = false;
    document.getElementById('camera-btn').classList.remove('active');
    if(liveActive) toggleLiveMode();
  }

  function toggleLiveMode() {
    if(!cameraActive) return alert('Enable camera for live stream.');
    const b = document.getElementById('live-btn');
    const i = document.getElementById('live-indicator');
    
    if(!liveActive) {
      liveActive = true;
      b.classList.add('active');
      i.style.display = 'block';
      startLoop();
    } else {
      liveActive = false;
      b.classList.remove('active');
      i.style.display = 'none';
      if(timerId) clearTimeout(timerId);
    }
  }

  function startLoop() {
    if(!liveActive) return;
    performAnalysis();
    timerId = setTimeout(startLoop, 8000); // 8sec cycles for efficiency
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      killCamera();
      const p = document.getElementById('static-preview');
      p.src = event.target.result;
      p.style.display = 'block';
      performAnalysis(event.target.result.split(',')[1]);
    };
    reader.readAsDataURL(file);
  }

  async function performAnalysis(manualB64 = null) {
    const key = localStorage.getItem(STORAGE_KEY) || document.getElementById('key-input').value;
    if(!key) { showError('System Key Missing.'); return; }

    let b64 = manualB64;
    if(!b64) {
      const v = document.getElementById('video-feed');
      const c = document.getElementById('canvas-temp');
      c.width = v.videoWidth;
      c.height = v.videoHeight;
      c.getContext('2d').drawImage(v, 0, 0);
      b64 = c.toDataURL('image/jpeg', 0.8).split(',')[1];
    }

    const payload = {
      contents: [{
        parts: [
          { inline_data: { mime_type: 'image/jpeg', data: b64 } },
          { text: "Analyze the crop image. Output JSON ONLY: {diagnosis: '', ripeness: '', brix: '', confidence: '', instruction: ''}. localize in Korean." }
        ]
      }]
    };

    const model = document.getElementById('model-select').value;
    const loading = document.getElementById('loading-overlay');
    loading.style.display = 'flex';

    try {
      // Use v1beta for widest model visibility
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
        method: 'POST', body: JSON.stringify(payload)
      });
      
      const data = await response.json();
      if(data.error) throw new Error(data.error.message + ' [' + data.error.code + ']');

      let raw = data.candidates[0].content.parts[0].text;
      raw = raw.replace(/```json/g, '').replace(/```/g, '').trim();
      const res = JSON.parse(raw);
      
      document.getElementById('report-panel').style.display = 'block';
      document.getElementById('res-rip').textContent = res.ripeness;
      document.getElementById('res-brix').textContent = res.brix;
      document.getElementById('res-conf').textContent = res.confidence;
      document.getElementById('res-diag').textContent = res.diagnosis;
      document.getElementById('res-inst').textContent = res.instruction;
      hideError();
    } catch(err) {
      showError('Analysis Failed: ' + err.message + '. Try switching model above.');
      console.error(err);
    } finally {
      loading.style.display = 'none';
    }
  }

  function showError(m) {
    const e = document.getElementById('error-log');
    e.innerHTML = `<strong>⚠️ Diagnosis Error:</strong><br>${m}<br><small>Tip: Check selection in dropdown above.</small>`;
    e.style.display = 'block';
  }
  function hideError() { document.getElementById('error-log').style.display = 'none'; }
  function updateModel() { hideError(); }
</script>
</body>
</html>
