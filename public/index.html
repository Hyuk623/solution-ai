<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berry Analyst AI | Real-time Multimodal Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }

    header {
      backdrop-filter: blur(12px); background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--glass-border); padding: 1.2rem 2rem;
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
    }
    header .logo { font-size: 1.3rem; font-weight: 700; }
    header .logo span { color: var(--accent); }

    .api-status { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .status-off { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .status-on { background: rgba(16, 185, 129, 0.1); color: #10b981; }

    .config-card {
      max-width: 800px; margin: 1.5rem auto 0; width: 100%; padding: 0 1.5rem;
    }
    .config-inner {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 1rem; padding: 0.8rem 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .config-inner input {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
      border-radius: 0.5rem; padding: 0.5rem 1rem; color: #fff; outline: none;
    }
    .config-inner button {
      background: var(--accent); color: #fff; border: none; border-radius: 0.5rem;
      padding: 0.5rem 1rem; font-weight: 700; cursor: pointer;
    }

    main { flex: 1; max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }

    .media-container {
      width: 100%; aspect-ratio: 4/3; border-radius: 2rem; overflow: hidden;
      background: #000; border: 1px solid var(--glass-border); 
      position: relative; margin-bottom: 1.5rem;
    }
    #video-feed { width: 100%; height: 100%; object-fit: cover; }
    #static-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
    #canvas-temp { display: none; }

    .media-overlay {
      position: absolute; bottom: 1.5rem; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 1rem;
    }
    .btn-circle {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    }
    .btn-circle:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
    .btn-circle.active { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }

    #report-panel { display: none; animation: slideUp 0.5s ease-out; }
    @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1rem; padding: 1rem; text-align: center; }
    .stat-box .val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .stat-box .lab { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

    .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1.2rem; padding: 1.2rem; margin-bottom: 1rem; }
    .card .title { font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; text-transform: uppercase; }
    .card .body { font-size: 0.95rem; line-height: 1.5; }

    #error-log {
      display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 0.75rem; padding: 1rem; color: #fca5a5; font-size: 0.8rem; margin-top: 1rem;
    }

    #live-indicator {
      position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(239,68,68,0.8);
      color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800;
      animation: pulse 1s infinite; display: none;
    }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .loader-inline { width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; display: none; animation: rotation 0.8s linear infinite; }
    @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">Berry<span>Analyst</span> AI</div>
  <div id="api-badge" class="api-status status-off">Key Required</div>
</header>

<div class="config-card">
  <div class="config-inner">
    <input id="key-input" type="password" placeholder="Input Gemini API Key (AIza...)" />
    <button onclick="saveKey()">Connect</button>
  </div>
</div>

<main>
  <div class="media-container">
    <video id="video-feed" autoplay playsinline muted></video>
    <img id="static-preview" src="" alt="Snapshot" />
    <canvas id="canvas-temp"></canvas>
    
    <div id="live-indicator">LIVE ANALYSIS ACTIVE</div>
    
    <div class="media-overlay">
      <button class="btn-circle" id="camera-btn" onclick="toggleCamera()" title="Toggle Camera">📸</button>
      <button class="btn-circle" id="live-btn" onclick="toggleLiveAnalysis()" title="Gemini Live Analysis">🤖</button>
      <button class="btn-circle" id="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload Photo">📂</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)" />
    </div>
  </div>

  <div id="report-panel">
    <div class="stats-row">
      <div class="stat-box">
        <div class="val" id="r-rip">-</div>
        <div class="lab">RIPENESS</div>
      </div>
      <div class="stat-box">
        <div class="val" id="r-brix">-</div>
        <div class="lab">BRIX EST.</div>
      </div>
      <div class="stat-box">
        <div class="val" id="r-conf">-</div>
        <div class="lab">CONFIDENCE</div>
      </div>
    </div>

    <div class="card">
      <div class="title">Diagnosis</div>
      <div class="body" id="r-diag">Waiting for AI assessment...</div>
    </div>
    <div class="card">
      <div class="title">Instruction</div>
      <div class="body" id="r-inst">-</div>
    </div>
  </div>

  <div id="error-log"></div>
</main>

<script>
  const KEY_NAME = 'berry_v3_key';
  let isCameraOn = false;
  let isLiveMode = false;
  let liveTimer = null;

  window.onload = () => {
    const key = localStorage.getItem(KEY_NAME);
    if(key) {
      document.getElementById('key-input').value = key;
      updateBadge(true);
    }
  };

  function saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if(!val) return alert('Input your API key.');
    localStorage.setItem(KEY_NAME, val);
    updateBadge(true);
    alert('Gemini Connected.');
  }

  function updateBadge(v) {
    const b = document.getElementById('api-badge');
    b.className = v ? 'api-status status-on' : 'api-status status-off';
    b.textContent = v ? 'Connected' : 'Key Required';
  }

  async function toggleCamera() {
    const video = document.getElementById('video-feed');
    const preview = document.getElementById('static-preview');
    const btn = document.getElementById('camera-btn');

    if(!isCameraOn) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.style.display = 'block';
        preview.style.display = 'none';
        isCameraOn = true;
        btn.classList.add('active');
        document.getElementById('report-panel').style.display = 'block';
      } catch(e) {
        showError('Camera Access Denied: ' + e.message);
      }
    } else {
      stopCamera();
    }
  }

  function stopCamera() {
    const video = document.getElementById('video-feed');
    if(video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    video.style.display = 'none';
    isCameraOn = false;
    document.getElementById('camera-btn').classList.remove('active');
    if(isLiveMode) toggleLiveAnalysis();
  }

  function toggleLiveAnalysis() {
    if(!isCameraOn) {
      alert('Start camera first for Live analysis.');
      return;
    }
    const btn = document.getElementById('live-btn');
    const indicator = document.getElementById('live-indicator');
    
    if(!isLiveMode) {
      isLiveMode = true;
      btn.classList.add('active');
      indicator.style.display = 'block';
      runLiveCycle();
    } else {
      isLiveMode = false;
      btn.classList.remove('active');
      indicator.style.display = 'none';
      if(liveTimer) clearTimeout(liveTimer);
    }
  }

  function runLiveCycle() {
    if(!isLiveMode) return;
    captureAndAnalyze();
    liveTimer = setTimeout(runLiveCycle, 6000); // 6초 인터벌
  }

  function handleFile(e) {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      stopCamera();
      const p = document.getElementById('static-preview');
      p.src = ev.target.result;
      p.style.display = 'block';
      captureAndAnalyze(ev.target.result.split(',')[1]);
    };
    reader.readAsDataURL(f);
  }

  async function captureAndAnalyze(manualB64 = null) {
    const key = localStorage.getItem(KEY_NAME) || document.getElementById('key-input').value;
    if(!key) { showError('API Key Missing.'); return; }

    let b64 = manualB64;
    if(!b64) {
      const video = document.getElementById('video-feed');
      const canvas = document.getElementById('canvas-temp');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    }

    const payload = {
      contents: [{
        parts: [
          { inline_data: { mime_type: 'image/jpeg', data: b64 } },
          { text: "Analyze this strawberry/crop image. Return strictly JSON ONLY: {diagnosis: '', ripeness: '', brix: '', confidence: '', instruction: ''}. Localize values in Korean." }
        ]
      }]
    };

    try {
      // v1 버전과 gemini-1.5-flash 모델 사용 (가장 안정적)
      const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: 'POST', body: JSON.stringify(payload)
      });
      const data = await r.json();
      
      if(data.error) {
        throw new Error(`${data.error.message} (${data.error.status})`);
      }
      
      let txt = data.candidates[0].content.parts[0].text;
      txt = txt.replace(/```json/g, '').replace(/```/g, '').trim();
      const result = JSON.parse(txt);
      
      document.getElementById('report-panel').style.display = 'block';
      document.getElementById('r-rip').textContent = result.ripeness;
      document.getElementById('r-brix').textContent = result.brix;
      document.getElementById('r-conf').textContent = result.confidence;
      document.getElementById('r-diag').textContent = result.diagnosis;
      document.getElementById('r-inst').textContent = result.instruction;
      hideError();
    } catch(err) {
      showError('Diagnosis Error: ' + err.message);
      console.error('API Error Details:', err);
    }
  }

  function showError(m) {
    const e = document.getElementById('error-log');
    e.textContent = m;
    e.style.display = 'block';
  }
  function hideError() { document.getElementById('error-log').style.display = 'none'; }
</script>
</body>
</html>
